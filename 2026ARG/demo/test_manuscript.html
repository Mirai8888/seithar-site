<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEITHAR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #ece8e0;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* Silver frame — layered like manuscript ruling */
.frame-outer {
  position: fixed;
  inset: 0;
  border: 8px solid #a8a49c;
  z-index: 30;
  pointer-events: none;
}
.frame-inner {
  position: fixed;
  top: 8px; left: 8px; right: 8px; bottom: 8px;
  border: 1.5px solid rgba(165, 162, 155, 0.5);
  z-index: 30;
  pointer-events: none;
}
.frame-inner2 {
  position: fixed;
  top: 12px; left: 12px; right: 12px; bottom: 12px;
  border: 0.5px solid rgba(165, 162, 155, 0.25);
  z-index: 30;
  pointer-events: none;
}

canvas#ms {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 5;
  pointer-events: none;
}

/* Content card — luminous white, vertical */
.content-card {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(30vw, 340px);
  min-height: min(65vh, 520px);
  background: #fff;
  z-index: 20;
  padding: 48px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid #b8b5ae;
  box-shadow:
    0 0 0 3px #ece8e0,
    0 0 0 4.5px rgba(145, 140, 132, 0.4),
    0 0 0 7px #ece8e0,
    0 0 0 8px rgba(145, 140, 132, 0.2);
}

.card-inner { text-align: center; }

.mark {
  font-size: 11px;
  letter-spacing: 8px;
  color: #aaa;
  margin-bottom: 40px;
}

.title {
  font-size: 24px;
  font-weight: 300;
  color: #1a1a1a;
  line-height: 1.6;
  margin-bottom: 16px;
}

.sub {
  font-size: 12px;
  color: #aaa;
  font-family: ui-monospace, 'SF Mono', monospace;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div class="frame-outer"></div>
<div class="frame-inner"></div>
<div class="frame-inner2"></div>

<canvas id="ms"></canvas>

<div class="content-card">
  <div class="card-inner">
    <div class="mark">S E I T H A R</div>
    <div class="title">Minds are hackable.<br>We are the security layer.</div>
    <div class="sub">seithar.com</div>
  </div>
</div>

<script src="manuscript.js"></script>
<script>
const c = document.getElementById('ms');
const card = document.querySelector('.content-card');
const dpr = window.devicePixelRatio || 1;

function sizeCanvas() {
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  c.getContext('2d').scale(dpr, dpr);
}
sizeCanvas();

const cardRect = card.getBoundingClientRect();
const mb = new ManuscriptBorder(c, {
  exclusion: {
    x: cardRect.left,
    y: cardRect.top,
    w: cardRect.width,
    h: cardRect.height,
    padding: 14,
  },
  growthRate: 6,
});
mb.start();

window.addEventListener('resize', () => {
  sizeCanvas();
  const r = card.getBoundingClientRect();
  mb.opts.exclusion = { x: r.left, y: r.top, w: r.width, h: r.height, padding: 14 };
  mb.resize(c.width, c.height);
});
</script>
</body>
</html>
