<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEITHAR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #f5f3ef;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* Layer 1: Border — monochrome frame */
.gilded-border {
  position: fixed;
  inset: 0;
  border: 14px solid #3a3a3a;
  z-index: 30;
  pointer-events: none;
}

.gilded-inner {
  position: fixed;
  top: 16px; left: 16px; right: 16px; bottom: 16px;
  border: 2px solid rgba(60, 60, 60, 0.5);
  z-index: 30;
  pointer-events: none;
}

.gilded-inner2 {
  position: fixed;
  top: 21px; left: 21px; right: 21px; bottom: 21px;
  border: 0.5px solid rgba(60, 60, 60, 0.25);
  z-index: 30;
  pointer-events: none;
}

/* Layer 2: Generative canvas — fills the space between border and card */
canvas#ms {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 5;
  pointer-events: none;
}

/* Layer 3: Content card — monochrome */
.content-card {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(32vw, 360px);
  min-height: min(70vh, 560px);
  background: #fff;
  z-index: 20;
  padding: 44px 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #3a3a3a;
  box-shadow:
    0 0 0 3px #fff,
    0 0 0 4.5px rgba(60, 60, 60, 0.4),
    0 0 0 7px #fff,
    0 0 0 8px rgba(60, 60, 60, 0.15);
}

.card-inner {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

.mark {
  font-size: 11px;
  letter-spacing: 8px;
  color: #999;
  margin-bottom: 36px;
  text-align: center;
}

.title {
  font-size: 26px;
  font-weight: 300;
  color: #1a1a1a;
  line-height: 1.5;
  text-align: center;
  margin-bottom: 12px;
}

.sub {
  font-size: 13px;
  color: #999;
  text-align: center;
  font-family: ui-monospace, 'SF Mono', monospace;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<!-- Layer 1: Gilded border -->
<div class="gilded-border"></div>
<div class="gilded-inner"></div>
<div class="gilded-inner2"></div>

<!-- Layer 2: Generative canvas -->
<canvas id="ms"></canvas>

<!-- Layer 3: Content card -->
<div class="content-card">
  <div class="card-inner">
    <div class="mark">S E I T H A R</div>
    <div class="title">Minds are hackable.<br>We are the security layer.</div>
    <div class="sub">seithar.com</div>
  </div>
</div>

<script src="manuscript.js"></script>
<script>
const c = document.getElementById('ms');
const card = document.querySelector('.content-card');
const dpr = window.devicePixelRatio || 1;

function sizeCanvas() {
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  c.getContext('2d').scale(dpr, dpr);
}
sizeCanvas();

// Pass card rect so generative avoids the content area
const cardRect = card.getBoundingClientRect();
const mb = new ManuscriptBorder(c, {
  // Card exclusion zone — generative fills AROUND it
  exclusion: {
    x: cardRect.left,
    y: cardRect.top,
    w: cardRect.width,
    h: cardRect.height,
    padding: 16,
  },
  treeSpacing: 14,
  minNodeDist: 7,
  nodeRadius: 2,
});
mb.start();

window.addEventListener('resize', () => {
  sizeCanvas();
  const r = card.getBoundingClientRect();
  mb.opts.exclusion = { x: r.left, y: r.top, w: r.width, h: r.height, padding: 16 };
  mb.resize(c.width, c.height);
});
</script>
</body>
</html>
