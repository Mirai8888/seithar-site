<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEITHAR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1714;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

.page {
  position: fixed;
  inset: 0;
  background: #1c1810; /* deep dark parchment/brown-black */
  overflow: hidden;
}

/* Generative canvas overlay — vines, dots, connective tissue */
canvas#gen {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  pointer-events: none;
}

/* Tile container — real images arranged algorithmically */
.tiles {
  position: absolute;
  inset: 0;
  z-index: 5;
}

.tiles img {
  position: absolute;
  object-fit: cover;
  opacity: 0;
  transition: opacity 1.2s ease-in;
}

.tiles img.loaded { opacity: 1; }

/* Content card */
.content-card {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  min-height: 440px;
  background: rgba(240, 232, 216, 0.97);
  z-index: 30;
  padding: 48px 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid #8b7d5e;
  box-shadow:
    inset 0 0 0 1px rgba(180, 160, 110, 0.3),
    0 0 0 4px #2a2520,
    0 0 0 6px #8b7d5e,
    0 0 0 9px #2a2520,
    0 0 0 10px rgba(139, 125, 94, 0.4),
    0 4px 40px rgba(0,0,0,0.5);
}

.card-inner { text-align: center; }
.mark {
  font-size: 11px; letter-spacing: 8px; color: #8b7d5e;
  margin-bottom: 40px; font-family: 'Garamond', 'Georgia', serif;
}
.title {
  font-size: 22px; font-weight: 400; color: #1a1714;
  line-height: 1.7; margin-bottom: 16px;
  font-family: 'Garamond', 'Georgia', serif;
}
.sub {
  font-size: 11px; color: #8b7d5e;
  font-family: ui-monospace, monospace; letter-spacing: 2px;
}
</style>
</head>
<body>
<div class="page">
  <div class="tiles" id="tiles"></div>
  <canvas id="gen"></canvas>
</div>

<div class="content-card">
  <div class="card-inner">
    <div class="mark">S E I T H A R</div>
    <div class="title">Minds are hackable.<br>We are the security layer.</div>
    <div class="sub">seithar.com</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// COLLAGE ENGINE — Real images + generative connective tissue
// ═══════════════════════════════════════

const TILES = [
  'tiles/ref-manuscript-23.jpg',
  'tiles/ref-manuscript-24.jpg',
  'tiles/ref-manuscript-25.jpg',
  'tiles/ref-manuscript-26.jpg',
  'tiles/ref-manuscript-27.jpg',
  'tiles/ref-manuscript-28.jpg',
  'tiles/ref-manuscript-29.jpg',
  'tiles/ref-manuscript-30.jpg',
  'tiles/ref-cathedral-portal.jpg',
  'tiles/ref-cathedral-statues-1.jpg',
  'tiles/ref-cathedral-statues-2.jpg',
];

// Seeded RNG
let seed = 42;
function rng() {
  let t = seed += 0x6D2B79F5;
  t = Math.imul(t ^ t >>> 15, t | 1);
  t ^= t + Math.imul(t ^ t >>> 7, t | 61);
  return ((t ^ t >>> 14) >>> 0) / 4294967296;
}
function range(a, b) { return a + rng() * (b - a); }
function irange(a, b) { return (a + rng() * (b - a)) | 0; }

// ═══════════════════════════════════════
// TILE PLACEMENT — Horror vacui image collage
// ═══════════════════════════════════════

const tilesEl = document.getElementById('tiles');
const card = document.querySelector('.content-card');

function getExclusion() {
  const r = card.getBoundingClientRect();
  return { x: r.left, y: r.top, w: r.width, h: r.height, pad: 20 };
}

function overlapsExclusion(x, y, w, h, ex) {
  return !(x + w < ex.x - ex.pad || x > ex.x + ex.w + ex.pad ||
           y + h < ex.y - ex.pad || y > ex.y + ex.h + ex.pad);
}

function placeTiles() {
  tilesEl.innerHTML = '';
  seed = 42;
  const ex = getExclusion();
  const W = window.innerWidth;
  const H = window.innerHeight;
  const placed = [];

  // Strategy: fill the page with overlapping cropped tiles
  // Vary sizes dramatically — some large feature pieces, many small fragments
  // LAYER 1: Large base coverage tiles (nearly full screen)
  // LAYER 2: Medium overlapping fragments
  // LAYER 3: Small detail fills for remaining gaps
  const layers = [
    { count: 30, minW: 0.3, maxW: 0.6, minH: 0.3, maxH: 0.55, opMin: 0.7, opMax: 1.0 },
    { count: 60, minW: 0.12, maxW: 0.3, minH: 0.12, maxH: 0.3, opMin: 0.6, opMax: 0.95 },
    { count: 80, minW: 0.05, maxW: 0.15, minH: 0.05, maxH: 0.18, opMin: 0.5, opMax: 0.9 },
  ];

  for (const layer of layers) {
  for (let i = 0; i < layer.count; i++) {
    const src = TILES[irange(0, TILES.length)];

    const tw = range(W * layer.minW, W * layer.maxW);
    const th = range(H * layer.minH, H * layer.maxH);

    const tx = range(-tw * 0.2, W - tw * 0.8);
    const ty = range(-th * 0.2, H - th * 0.8);

    if (overlapsExclusion(tx, ty, tw, th, ex)) continue;

    const img = document.createElement('img');
    img.src = src;
    img.style.left = tx + 'px';
    img.style.top = ty + 'px';
    img.style.width = tw + 'px';
    img.style.height = th + 'px';

    // Random crop position within the image
    const ox = range(0, 60);
    const oy = range(0, 60);
    img.style.objectPosition = `${ox}% ${oy}%`;

    // Higher opacity, richer blending
    const blend = rng();
    if (blend < 0.2) {
      img.style.mixBlendMode = 'multiply';
      img.style.opacity = range(layer.opMin, layer.opMax);
    } else if (blend < 0.35) {
      img.style.mixBlendMode = 'screen';
      img.style.opacity = range(layer.opMin * 0.7, layer.opMax * 0.8);
    } else {
      img.style.opacity = range(layer.opMin, layer.opMax);
    }

    // Slight rotation for organic feel
    const rot = range(-3, 3);
    img.style.transform = `rotate(${rot}deg)`;

    // Border for some — gold leaf frame effect
    if (rng() < 0.3) {
      img.style.border = `${range(2, 4)}px solid #8b7d5e`;
      img.style.boxShadow = '0 1px 4px rgba(0,0,0,0.15)';
    }

    img.onload = () => img.classList.add('loaded');
    tilesEl.appendChild(img);
    placed.push({ x: tx, y: ty, w: tw, h: th });
  }
  } // end layers loop
}

placeTiles();

// ═══════════════════════════════════════
// GENERATIVE CANVAS — Connective tissue
// Gold vine scrollwork, bezants, fine lines
// ═══════════════════════════════════════

const canvas = document.getElementById('gen');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;

function sizeCanvas() {
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.scale(dpr, dpr);
}
sizeCanvas();

// Generative vine/ornament fill
const GOLD = 'rgba(139, 125, 94, VAR)';
const LAPIS = 'rgba(40, 60, 120, VAR)';
const VERMILLION = 'rgba(160, 50, 40, VAR)';
const FOREST = 'rgba(60, 90, 50, VAR)';

function col(base, alpha) { return base.replace('VAR', alpha.toFixed(3)); }

// Vine segments that grow across the page
let vines = [];
let bezants = [];
let frameCount = 0;

function initVines() {
  vines = [];
  bezants = [];
  seed = 777;
  const W = window.innerWidth;
  const H = window.innerHeight;
  const ex = getExclusion();

  // Vine seeds from edges and corners
  const starts = [];
  for (let y = 10; y < H; y += range(12, 30)) {
    starts.push({ x: range(0, 5), y, angle: range(-0.5, 0.5) });
    starts.push({ x: W - range(0, 5), y, angle: Math.PI + range(-0.5, 0.5) });
  }
  for (let x = 10; x < W; x += range(12, 30)) {
    starts.push({ x, y: range(0, 5), angle: Math.PI/2 + range(-0.5, 0.5) });
    starts.push({ x, y: H - range(0, 5), angle: -Math.PI/2 + range(-0.5, 0.5) });
  }

  for (const start of starts) {
    let x = start.x, y = start.y, a = start.angle;
    const segs = irange(8, 25);
    const segLen = range(8, 20);

    for (let i = 0; i < segs; i++) {
      a += range(-0.3, 0.3);
      const ex2 = x + Math.cos(a) * segLen;
      const ey = y + Math.sin(a) * segLen;

      if (overlapsExclusion(Math.min(x, ex2) - 5, Math.min(y, ey) - 5,
          Math.abs(ex2 - x) + 10, Math.abs(ey - y) + 10,
          { ...ex, pad: ex.pad + 10 })) break;

      const colors = [GOLD, LAPIS, VERMILLION, FOREST];
      const c = colors[irange(0, colors.length)];

      vines.push({
        x, y, endX: ex2, endY: ey,
        color: c,
        width: range(0.4, 1.5),
        drawn: false,
        drawT: 0,
      });

      // Bezant (gold dot) at junction
      if (rng() < 0.4) {
        bezants.push({
          x: ex2, y: ey,
          r: range(1.5, 4),
          color: rng() < 0.6 ? GOLD : (rng() < 0.5 ? LAPIS : VERMILLION),
          drawn: false,
          drawT: 0,
        });
      }

      // Small leaf/tendril
      if (rng() < 0.3) {
        const leafA = a + (rng() > 0.5 ? 1 : -1) * range(0.5, 1.2);
        const leafLen = range(4, 10);
        const lx = ex2 + Math.cos(leafA) * leafLen;
        const ly = ey + Math.sin(leafA) * leafLen;
        vines.push({
          x: ex2, y: ey, endX: lx, endY: ly,
          color: FOREST,
          width: range(0.2, 0.6),
          drawn: false,
          drawT: 0,
        });
      }

      x = ex2; y = ey;
    }
  }

  // Shuffle
  for (let i = vines.length - 1; i > 0; i--) {
    const j = (rng() * (i + 1)) | 0;
    [vines[i], vines[j]] = [vines[j], vines[i]];
  }
}

initVines();

let vineIdx = 0;
let bezIdx = 0;
const VINES_PER_FRAME = 6;
const BEZ_PER_FRAME = 1;

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  // Activate new vines
  for (let i = 0; i < VINES_PER_FRAME && vineIdx < vines.length; i++, vineIdx++) {
    vines[vineIdx].drawn = true;
  }
  // Activate bezants
  if (frameCount % 3 === 0) {
    for (let i = 0; i < BEZ_PER_FRAME && bezIdx < bezants.length; i++, bezIdx++) {
      bezants[bezIdx].drawn = true;
    }
  }

  // Step draw progress
  for (const v of vines) {
    if (v.drawn && v.drawT < 1) v.drawT = Math.min(1, v.drawT + 0.08);
  }
  for (const b of bezants) {
    if (b.drawn && b.drawT < 1) b.drawT = Math.min(1, b.drawT + 0.06);
  }

  // Render
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);

  // Vines
  ctx.lineCap = 'round';
  for (const v of vines) {
    if (!v.drawn || v.drawT < 0.01) continue;
    const t = v.drawT;
    const cx = v.x + (v.endX - v.x) * t;
    const cy = v.y + (v.endY - v.y) * t;

    ctx.strokeStyle = col(v.color, 0.6 * t);
    ctx.lineWidth = v.width;
    ctx.beginPath();
    ctx.moveTo(v.x, v.y);
    ctx.lineTo(cx, cy);
    ctx.stroke();
  }

  // Bezants
  for (const b of bezants) {
    if (!b.drawn || b.drawT < 0.01) continue;
    const t = b.drawT;
    ctx.fillStyle = col(b.color, 0.7 * t);
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * t, 0, Math.PI * 2);
    ctx.fill();

    // Gold highlight
    if (b.color === GOLD) {
      ctx.fillStyle = `rgba(220, 200, 150, ${0.3 * t})`;
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.2, b.y - b.r * 0.2, b.r * 0.3 * t, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Reseed when done
  if (vineIdx >= vines.length && bezIdx >= bezants.length &&
      vines.every(v => v.drawT >= 1) && bezants.every(b => b.drawT >= 1)) {
    seed = (seed + 13) | 0;
    vineIdx = 0;
    bezIdx = 0;
    initVines();
  }
}

animate();

window.addEventListener('resize', () => {
  sizeCanvas();
  placeTiles();
  initVines();
  vineIdx = 0;
  bezIdx = 0;
});
</script>
</body>
</html>
