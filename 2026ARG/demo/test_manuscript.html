<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generative Hypermedievalism — Seithar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; overflow: hidden; }
canvas#ms {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 10;
  pointer-events: none;
}
.content {
  position: relative;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 140px;
}
.inner {
  max-width: 600px;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}
.mark {
  font-size: 13px;
  letter-spacing: 10px;
  color: #aaa;
  margin-bottom: 28px;
}
.title {
  font-size: 28px;
  font-weight: 300;
  color: #1a1a1a;
  line-height: 1.5;
  margin-bottom: 12px;
}
.sub {
  font-size: 14px;
  color: #999;
  line-height: 1.7;
  font-family: ui-monospace, 'SF Mono', monospace;
  letter-spacing: 2px;
}
</style>
</head>
<body>
<canvas id="ms"></canvas>
<div class="content">
  <div class="inner">
    <div class="mark">S E I T H A R</div>
    <div class="title">Minds are hackable.<br>We are the security layer.</div>
    <div class="sub">seithar.com</div>
  </div>
</div>
<script src="manuscript.js"></script>
<script>
const c = document.getElementById('ms');
const dpr = window.devicePixelRatio || 1;
function sizeCanvas() {
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  c.getContext('2d').scale(dpr, dpr);
}
sizeCanvas();

const mb = new ManuscriptBorder(c, {
  borderWidth: Math.min(220, window.innerWidth * 0.18),
  density: 0.95,
  growthRate: 2.0,
  maxVines: 350,
  cycleTime: 50000,
  enochianDensity: 0.6,
});
mb.start();

window.addEventListener('resize', () => {
  sizeCanvas();
  mb.resize(c.width, c.height);
});
</script>
</body>
</html>
