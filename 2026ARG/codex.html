<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEITHAR</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; overflow: hidden; }
canvas#ms {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}
</style>
</head>
<body>
<canvas id="ms"></canvas>
<script src="js/manuscript.js"></script>
<script>
const c = document.getElementById('ms');
const dpr = window.devicePixelRatio || 1;
function sizeCanvas() {
  c.width = window.innerWidth * dpr;
  c.height = window.innerHeight * dpr;
  c.style.width = window.innerWidth + 'px';
  c.style.height = window.innerHeight + 'px';
  c.getContext('2d').scale(dpr, dpr);
}
sizeCanvas();
const mb = new ManuscriptBorder(c, {
  borderWidth: Math.min(280, window.innerWidth * 0.22),
  rebalanceInterval: 80,
  mutationRate: 0.012,
});
mb.start();
window.addEventListener('resize', () => {
  sizeCanvas();
  mb.resize(c.width, c.height);
});
</script>
</body>
</html>
